name: Deploy Integrations

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-integrations-${{ github.ref }}
  cancel-in-progress: false

jobs:
  discover:
    name: Select integration
    runs-on: ubuntu-latest
    outputs:
      integrations: ${{ steps.find.outputs.integrations }}
    steps:
      - id: find
        run: echo 'integrations=["fivem"]' >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy ${{ matrix.integration }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      matrix:
        integration: ${{ fromJson(needs.discover.outputs.integrations) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ${{ matrix.integration }}
        run: npm install

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ${{ matrix.integration }}
